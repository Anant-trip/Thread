<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LUN DEV</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="loginc.css">
</head>

<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="">
        </div>
        <h1>Hi, welcome back!</h1>
        <p>First time here? <span class="text-white">Sign up for free</span></p>
    </header>
    <div class="wrapper">
        <div class="form-wrapper sign-in">
    <form action="index.html" method="POST">

        <input 
        type="Username" 
        name="Username" 
        placeholder="Username"
        required>

        <input 
        type="password" 
        name="password" 
        placeholder="Password"
        minlength="6"
        required>
        <p>Password must be at least 6 characters</p>

        <button type="submit" value="/">Login</button>
        <div class="signUp-link">
            <p>Don't have an account? <a href="#" class="signUpBtn-link">Sign Up</a></p>
        </div>
    </form>
        </div>
        <div class="form-wrapper sign-up">
            <form action="login.html" method="POST">
                <h2>Sign Up</h2>
                <input 
                type="Username" 
                name="Username" 
                placeholder="Username"
                required>
        
                <input 
                type="email" 
                name="email" 
                placeholder="Your email"
                required>
        
                <input 
                type="password" 
                name="password" 
                placeholder="Password"
                minlength="6"
                required>
                <p>Password must be at least 6 characters</p>
                <button type="submit" value="/post"> Sign-Up</button>
                <div class="signUp-link">
                    <p>Already have an account?<a href="#" class="signInBtn-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="loginj.js"></script>
</body>

</html>
